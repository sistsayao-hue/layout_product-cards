<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Product cards</title>
    <link
      rel="stylesheet"
      href="./styles/index.css"
    />
  </head>
  <body>
    <div
      class="card"
      data-qa="card"
    >
      <div class="card__image"></div>

      <div class="card__product">
        APPLE A1419 iMac 27" Retina
        <br />
        5K Monoblock (MNED2UA/A)
      </div>

      <div class="card__code">Product code: 195434</div>

      <div class="card__review">
        <div
          class="stars stars--4"
          aria-label="rating"
        >
          <span
            class="stars__item"
            data-value="1"
          ></span>

          <span
            class="stars__item"
            data-value="2"
          ></span>

          <span
            class="stars__item"
            data-value="3"
          ></span>

          <span
            class="stars__item"
            data-value="4"
          ></span>

          <span
            class="stars__item"
            data-value="5"
          ></span>
        </div>

        <span class="card__revquant">Reviews: 5</span>
      </div>

      <div class="card__price">
        <span class="card__pricelabel">Price</span>
        <span class="card__pricevalue">$2,199</span>
      </div>
<a>
      <button
        class="card__button"
        data-qa="hover"
      >
        BUY
      </button>
  </a>
    </div>
  </body>
</html>
